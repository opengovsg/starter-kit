packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  '@eslint/js': ^9.39.1
  '@hookform/resolvers': ^5.2.2
  '@types/node': ^24.10.4
  dd-trace: ^5.81.0
  dotenv-cli: ^11.0.0
  eslint: ^9.39.2
  pino: ^10.1.0
  pino-pretty: ^13.1.3
  oxfmt: ^0.41.0
  prisma-extension-kysely: ^4.0.0
  prisma-kysely: ^3.1.0
  react-aria-components: 1.16.0
  react-hook-form: ^7.69.0
  typescript: ^5.9.3
  zod: ^4.2.1

catalogs:
  next:
    '@next/env': 16.2.6
    '@next/eslint-plugin-next': 16.2.6
    next: 16.2.6
  oui:
    '@opengovsg/oui': 0.0.52
    '@opengovsg/oui-theme': 0.0.52
  playwright:
    '@playwright/test': 1.57.0
    playwright: 1.57.0
  prisma:
    '@prisma/adapter-pg': 7.8.0
    '@prisma/client': 7.8.0
    prisma: 7.8.0
  react:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.5
    react-dom: ^19.2.5
  react-query5:
    '@tanstack/react-query': ^5.100.9
    '@tanstack/react-query-devtools': ^5.100.9
  storybook10:
    '@storybook/addon-a11y': 10.3.5
    '@storybook/addon-docs': 10.3.5
    '@storybook/addon-vitest': 10.3.5
    '@storybook/nextjs-vite': 10.3.5
    eslint-plugin-storybook: 10.3.5
    storybook: 10.3.5
    storybook-addon-vite-mock: ^1.1.1
  t3-env:
    '@t3-oss/env-core': ^0.13.8
    '@t3-oss/env-nextjs': ^0.13.8
  tailwindcss4:
    '@tailwindcss/postcss': ^4.2.2
    tailwindcss: ^4.2.2
  trpc:
    '@trpc/client': ^11.16.0
    '@trpc/server': ^11.16.0
    '@trpc/tanstack-react-query': ^11.16.0
  vitest:
    '@vitest/browser': 4.0.8
    '@vitest/browser-playwright': 4.0.8
    '@vitest/coverage-v8': 4.0.8
    vitest: 4.0.8

linkWorkspacePackages: true

blockExoticSubdeps: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # If there is a CVE, exclude it here so we can update it immediately without waiting for the minimum release age to pass.
  - '@opengovsg/*'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma

overrides:
  '@types/minimatch': 5.1.2
  # Prevent inclusion of sharp-libvips-*, which uses a copyleft license
  '@img/sharp-libvips-darwin-arm64': '-'

publicHoistPattern:
  - '*oxfmt*'
  - '*eslint-plugin*'
  - '*@opengovsg/oui*'
  - '*prisma*'
  - pg
